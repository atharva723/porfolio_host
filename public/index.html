<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atharva Jadhav - Cloud Infrastructure Engineer</title>
    <link rel="preload" as="image" href="./port.webp" media="(min-width: 769px)">
    <link rel="preload" as="image" href="./port-mobile.webp" media="(max-width: 768px)">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">

</head>
<body>
    <!-- Scroll progress bar -->
    <div class="scroll-progress" id="scrollProgress"></div>

    <!-- Ambient aurora background -->
    <div class="aurora" aria-hidden="true">
        <span class="orb orb-1"></span>
        <span class="orb orb-2"></span>
        <span class="orb orb-3"></span>
    </div>

    <!-- Film grain overlay -->
    <div class="grain" aria-hidden="true"></div>

    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <ul class="nav-links" id="navLinks">
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#skills">Skills</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#experience">Experience</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="hero cinema-hero">
        <div class="hero-bg" id="heroBg"></div>

        <div class="hero-content">
            <span class="hero-tag" id="heroTag"></span>
            <h1><span id="first-name" style="font-size: 55px;"></span>
                <span class="gradient-text" id="last-name" style="font-size: 55px;"></span></h1>
            <p id="heroSubtitle"></p>

            <div class="hero-cta">
                <a href="#contact" class="btn btn-primary">Let's Connect</a>
                <a href="#projects" class="btn btn-secondary">View Work</a>
            </div>
        </div>
    </section>

    <!-- About Section -->
    <section id="about">
        <div class="section-header reveal">
            <span class="section-tag" id="aboutTag"></span>
            <h2 class="section-title" id="aboutTitle"></h2>
        </div>
        <div class="about-content">
            <div class="about-text reveal" id="aboutText"></div>
            <div class="stats reveal" id="statsGrid"></div>
        </div>
    </section>

    <!-- Skills Section -->
    <section id="skills">
        <div class="section-header reveal">
            <span class="section-tag" id="skillsTag"></span>
            <h2 class="section-title" id="skillsTitle"></h2>
            <p class="section-description" id="skillsDesc"></p>
        </div>
        <div class="skills-grid reveal-stagger" id="skillsGrid"></div>
    </section>

    <!-- Projects Section -->
    <section id="projects">
        <div class="section-header reveal">
            <span class="section-tag" id="projectsTag"></span>
            <h2 class="section-title" id="projectsTitle"></h2>
            <p class="section-description" id="projectsDesc"></p>
        </div>
        <div class="projects-grid projects-stack" id="projectsGrid"></div>
    </section>

    <!-- Experience Section -->
    <section id="experience">
        <div class="section-header reveal">
            <span class="section-tag" id="experienceTag"></span>
            <h2 class="section-title" id="experienceTitle"></h2>
        </div>
        <div id="experienceList"></div>
    </section>

    <!-- Contact Section -->
    <section id="contact">
        <div class="contact-content reveal">
            <span class="section-tag" id="contactTag"></span>
            <h2 class="section-title" id="contactTitle"></h2>
            <p class="section-description" id="contactDesc"></p>
            <div class="contact-links" id="contactLinks"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p id="footerText"></p>
    </footer>

    <!-- Scroll to top -->
    <button class="scroll-top" id="scrollTop" aria-label="Scroll to top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Content lives in data.js — edit that file to update the portfolio -->
    <script src="./js/data.js"></script>
    <script src="./js/render.js"></script>
    <script src="./js/script.js"></script>



</body>
</html>
